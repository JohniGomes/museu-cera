<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamento de Vendas — Museu de Cera RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:   #127369;
  --green2:  #10403B;
  --green-l: #e8f0ef;
  --green-m: rgba(18,115,105,0.12);
  --bg:      #f4f5f5;
  --white:   #FFFFFF;
  --text:    #10403B;
  --muted:   #4C5958;
  --muted2:  #8AA6A3;
  --border:  #BFBFBF;
  --danger:  #c0392b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  font-size: 15px;
}

.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 28px 16px 80px;
}

/* Header */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header-text {}
.header-date {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 2px;
}
.header-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}
.header-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}
.header-avatar {
  width: 40px; height: 40px;
  background: var(--green);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.header-avatar svg { width: 20px; height: 20px; }

/* Card */
.card {
  background: var(--white);
  border-radius: 20px;
  overflow: visible;
  padding: 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}

.card-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 20px 24px 8px;
}

/* Field row */
.field {
  display: flex;
  align-items: center;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  min-height: 60px;
}
.field:last-child { border-bottom: none; }

.field-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--green-l);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.field-icon svg { width: 16px; height: 16px; color: var(--green); }

.field-body { flex: 1; min-width: 0; }
.field-lbl {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.field-ctrl {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  width: 100%;
}

/* Inputs */
input[type="date"],
input[type="number"],
input[type="text"] {
  background: none;
  border: none;
  outline: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  width: 100%;
  padding: 0;
}
input::placeholder { color: var(--muted2); font-weight: 400; }
input[type="date"]::-webkit-calendar-picker-indicator {
  opacity: 0.4; cursor: pointer;
}

/* Vendedor row */
.vwrap { display: flex; align-items: center; gap: 8px; }
.vwrap select {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
}
.vwrap select option { background: #fff; color: var(--text); }

.btn-plus {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--green);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.btn-plus:hover { background: var(--green2); }
.btn-plus svg { width: 14px; height: 14px; color: white; }

/* Custom dropdown produto */
.cdd { position: relative; width: 100%; }
.cdd-trigger {
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; outline: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--text); text-align: left;
  cursor: pointer; width: 100%; padding: 0; gap: 8px;
}
.cdd-trigger.ph { color: var(--muted2); font-weight: 400; }
.cdd-trigger svg { flex-shrink: 0; opacity: 0.4; transition: transform 0.2s; }
.cdd.open .cdd-trigger svg { transform: rotate(180deg); opacity: 0.7; }

.cdd-panel {
  position: fixed;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.14);
  z-index: 999;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.cdd.open .cdd-panel { display: block; }

.cdd-group {
  padding: 10px 16px 4px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--green);
}
.cdd-opt {
  padding: 10px 16px;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.1s;
}
.cdd-opt:hover { background: var(--green-l); color: var(--text); }
.cdd-opt.sel { color: var(--green); font-weight: 600; }
.cdd-panel::-webkit-scrollbar { width: 4px; }
.cdd-panel::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }

/* Badge produto selecionado */
.prod-badge {
  font-size: 13px; font-weight: 500;
  color: var(--green);
  line-height: 1.4;
}

/* Valores grid */
.val-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--green-l);
}
.val-item {}
.val-lbl { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
.val-num { font-size: 17px; font-weight: 600; color: var(--text); }
.val-num.hi { color: var(--green); }

/* Total */
.total-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: var(--green);
  border-radius: 0 0 20px 20px;
}
.total-lbl { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); letter-spacing: 0.06em; text-transform: uppercase; }
.total-num { font-size: 24px; font-weight: 600; color: white; }

/* Pills de categoria */
.cat-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 4px 0;
}
.cat-pill input { display: none; }
.cat-pill span {
  display: inline-block;
  padding: 6px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.cat-pill input:checked + span {
  background: var(--green);
  border-color: var(--green);
  color: white;
}
.cat-pill:hover span { border-color: var(--green); color: var(--green); }

/* Radio pills */
.radio-group { display: flex; gap: 8px; }
.rpill input { display: none; }
.rpill span {
  display: inline-block;
  padding: 6px 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.03em;
}
.rpill input:checked + span {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

/* Divider */
.sec-sep {
  display: flex; align-items: center; gap: 10px;
  padding: 0 24px;
  margin: 4px 0;
}
.sec-sep-line { flex: 1; height: 1px; background: var(--border); }
.sec-sep-txt { font-size: 10px; font-weight: 600; color: var(--muted2); letter-spacing: 0.1em; text-transform: uppercase; }

/* Botões */
.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn-primary {
  flex: 1; padding: 15px;
  background: var(--green); color: white;
  border: none; border-radius: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  box-shadow: 0 6px 20px rgba(29,201,148,0.35);
}
.btn-primary:hover { background: var(--green2); }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost {
  padding: 15px 22px;
  background: var(--white); color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer; transition: all 0.15s;
}
.btn-ghost:hover { border-color: var(--muted2); color: var(--text); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,20,35,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 20px;
  width: 100%; max-width: 400px;
  padding-bottom: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  animation: fadeup 0.22s ease;
  position: relative;
  z-index: 1001;
}
@keyframes fadeup { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { display: none; }
.modal-title {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
}
@media (max-width: 480px) {
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal { border-radius: 20px 20px 0 0; max-width: 100%; }
  .modal-handle { display: block; }
}
.modal-body { padding: 20px 24px 0; }
.modal-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.modal-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px; font-weight: 500; color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--green); }
.modal-input::placeholder { color: var(--muted2); font-weight: 400; }
.btn-add {
  padding: 12px 16px;
  background: var(--green); color: white;
  border: none; border-radius: 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s;
}
.btn-add:hover { background: var(--green2); }
.v-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
.v-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  background: var(--bg);
  border-radius: 10px;
  font-size: 14px; font-weight: 500; color: var(--text);
}
.v-del {
  background: none; border: none; color: var(--muted2);
  font-size: 18px; cursor: pointer; padding: 0 4px;
  border-radius: 4px; line-height: 1;
  transition: color 0.15s;
}
.v-del:hover { color: var(--danger); }
.v-empty { text-align: center; font-size: 13px; color: var(--muted2); padding: 14px 0; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--green); color: white;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  padding: 12px 24px; border-radius: 12px;
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 400;
  white-space: nowrap;
  box-shadow: 0 6px 20px rgba(29,201,148,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Mobile */
@media (max-width: 480px) {
  .page { padding: 20px 12px 80px; }
  .field { padding: 12px 16px; }
  .val-grid { padding: 12px 16px; }
  .total-row { padding: 14px 16px; }
  .btn-row { flex-direction: column-reverse; }
  .card-section-title { padding: 16px 16px 6px; }
  .sec-sep { padding: 0 16px; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-text">
      <div class="header-date" id="h-date"></div>
      <div class="header-title">Registrar Venda</div>
      <div class="header-sub">Museu de Cera RJ</div>
    </div>
    <div class="header-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-section-title">Dados da venda</div>

    <!-- DATA -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Data</div>
        <div class="field-ctrl"><input type="date" id="f-data"></div>
      </div>
    </div>

    <!-- VENDEDOR -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Vendedor</div>
        <div class="field-ctrl">
          <div class="vwrap">
            <select id="f-vendedor">
              <option value="">— Selecione —</option>
            </select>
            <button class="btn-plus" id="btn-vend-open" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- CATEGORIA -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Categoria</div>
        <div class="field-ctrl">
          <div class="cat-pills">
            <label class="cat-pill"><input type="radio" name="cat" value="avulso" onchange="onCategoria()"><span>Avulso</span></label>
            <label class="cat-pill"><input type="radio" name="cat" value="combo_duplo" onchange="onCategoria()"><span>Combo Duplo</span></label>
            <label class="cat-pill"><input type="radio" name="cat" value="combo_triplo" onchange="onCategoria()"><span>Combo Triplo</span></label>
            <label class="cat-pill"><input type="radio" name="cat" value="exp_completa" onchange="onCategoria()"><span>Exp. Completa</span></label>
            <label class="cat-pill"><input type="radio" name="cat" value="complementos" onchange="onCategoria()"><span>Complementos</span></label>
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUTO -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Produto · combo ou ingresso</div>
        <div class="field-ctrl">
          <div class="cdd" id="cdd">
            <button type="button" class="cdd-trigger ph" id="cdd-btn">
              <span id="cdd-lbl">— Selecione —</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="cdd-panel" id="cdd-panel"></div>
            <input type="hidden" id="f-produto">
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUTO SELECIONADO -->
    <div class="field" id="row-badge" style="display:none">
      <div class="field-icon" style="background:var(--green-m)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--green)">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Selecionado</div>
        <div class="prod-badge" id="badge"></div>
      </div>
    </div>

    <!-- VALORES -->
    <div class="val-grid" id="row-vals" style="display:none">
      <div class="val-item">
        <div class="val-lbl">Valor unit.</div>
        <div class="val-num hi" id="v-unit">—</div>
      </div>
      <div class="val-item">
        <div class="val-lbl">Parcela museu</div>
        <div class="val-num" id="v-museu">—</div>
      </div>
    </div>

    <!-- QUANTIDADE -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Quantidade</div>
        <div class="field-ctrl"><input type="number" id="f-qtd" value="1" min="1" max="999" oninput="calcTotal()"></div>
      </div>
    </div>

    <!-- CANAL -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Canal de venda</div>
        <div class="field-ctrl">
          <div class="radio-group">
            <label class="rpill"><input type="radio" name="canal" value="Bilheteria" checked><span>Bilheteria</span></label>
            <label class="rpill"><input type="radio" name="canal" value="POS"><span>POS</span></label>
          </div>
        </div>
      </div>
    </div>

    <!-- DIVISOR META -->
    <div class="sec-sep" style="margin-top:8px">
      <div class="sec-sep-line"></div>
      <div class="sec-sep-txt">Referência</div>
      <div class="sec-sep-line"></div>
    </div>

    <!-- META -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
        </svg>
      </div>
      <div class="field-body">
        <div class="field-lbl">Meta do dia</div>
        <div class="field-ctrl"><input type="number" id="f-meta" placeholder="Ex: 5000" min="0"></div>
      </div>
    </div>

    <!-- TOTAL -->
    <div class="total-row">
      <div class="total-lbl">Total do bilhete</div>
      <div class="total-num" id="v-total">R$ 0,00</div>
    </div>

  </div><!-- /card -->

  <div class="btn-row">
    <button class="btn-ghost" type="button" onclick="limpar()">Limpar</button>
    <button class="btn-primary" type="button" onclick="salvar()">Registrar venda</button>
  </div>

  <div style="margin-top:12px;text-align:center">
    <a href="dashboard.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--green);text-decoration:none;padding:8px 16px;border:1.5px solid var(--green);border-radius:20px;transition:all 0.15s" onmouseover="this.style.background='var(--green-l)'" onmouseout="this.style.background='transparent'">

function onCategoria() {
  const cat = document.querySelector('input[name="cat"]:checked')?.value;
  // Resetar produto
  document.getElementById('f-produto').value = '';
  document.getElementById('cdd-lbl').textContent = '— Selecione o produto —';
  document.getElementById('cdd-btn').classList.add('ph');
  document.querySelectorAll('.cdd-opt').forEach(o => o.classList.remove('sel'));
  document.getElementById('row-badge').style.display = 'none';
  document.getElementById('row-vals').style.display  = 'none';
  document.getElementById('v-total').textContent = 'R$ 0,00';

  // Rebuild painel com itens da categoria
  const panel = document.getElementById('cdd-panel');
  panel.innerHTML = '';
  if (!cat || !produtosPorCat[cat]) return;
  produtosPorCat[cat].forEach(([label, value]) => {
    const opt = document.createElement('div');
    opt.className = 'cdd-opt';
    opt.textContent = label;
    opt.dataset.v = value;
    panel.appendChild(opt);
  });
}

// Inicializar painel vazio (aguarda seleção de categoria)
(function initCdd() {
  const panel = document.getElementById('cdd-panel');
  panel.innerHTML = '';
})();


// Abrir/fechar dropdown produto
document.getElementById('cdd-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  const cdd = document.getElementById('cdd');
  const isOpen = cdd.classList.contains('open');
  if (isOpen) { cdd.classList.remove('open'); return; }
  const rect = this.getBoundingClientRect();
  const panel = document.getElementById('cdd-panel');
  panel.style.top   = (rect.bottom + 6) + 'px';
  panel.style.left  = Math.max(8, rect.left - 16) + 'px';
  panel.style.width = Math.min(window.innerWidth - 16, rect.width + 32) + 'px';
  cdd.classList.add('open');
});

// Selecionar opção
document.getElementById('cdd-panel').addEventListener('click', function(e) {
  const opt = e.target.closest('.cdd-opt');
  if (!opt) return;
  const value = opt.dataset.v;
  const label = opt.textContent;
  document.getElementById('cdd-lbl').textContent = label;
  document.getElementById('cdd-btn').classList.remove('ph');
  document.getElementById('f-produto').value = value;
  document.querySelectorAll('.cdd-opt').forEach(o => o.classList.toggle('sel', o === opt));
  document.getElementById('cdd').classList.remove('open');
  onProduto();
});

// Fechar ao clicar fora
document.addEventListener('click', function(e) {
  if (!document.getElementById('cdd').contains(e.target))
    document.getElementById('cdd').classList.remove('open');
});

// ── Produto selecionado ──
function onProduto() {
  const val = document.getElementById('f-produto').value;
  if (!val) {
    document.getElementById('row-badge').style.display = 'none';
    document.getElementById('row-vals').style.display  = 'none';
    document.getElementById('v-total').textContent = 'R$ 0,00';
    return;
  }
  const [nome, preco] = val.split('|');
  document.getElementById('badge').textContent = nome;
  document.getElementById('v-unit').textContent = fmt(Number(preco));
  const m = museuVal[nome];
  document.getElementById('v-museu').textContent = m ? fmt(m) : '—';
  document.getElementById('row-badge').style.display = '';
  document.getElementById('row-vals').style.display  = '';
  calcTotal();
}

function calcTotal() {
  const val = document.getElementById('f-produto').value;
  if (!val) return;
  const [, preco] = val.split('|');
  const qtd = parseInt(document.getElementById('f-qtd').value) || 1;
  document.getElementById('v-total').textContent = fmt(Number(preco) * qtd);
}

// ── Vendedores ──
let vendedores = JSON.parse(localStorage.getItem('mcera_vend') || '[]');

function saveVend() { localStorage.setItem('mcera_vend', JSON.stringify(vendedores)); }

function renderSelect() {
  const sel = document.getElementById('f-vendedor');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Selecione —</option>';
  vendedores.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n; sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

function renderLista() {
  const list = document.getElementById('v-list');
  list.innerHTML = '';
  if (!vendedores.length) {
    list.innerHTML = '<div class="v-empty">Nenhum vendedor cadastrado ainda</div>';
    return;
  }
  vendedores.forEach((n, i) => {
    const d = document.createElement('div');
    d.className = 'v-item';
    d.innerHTML = `<span>${n}</span><button class="v-del" type="button" data-i="${i}">×</button>`;
    list.appendChild(d);
  });
}

document.getElementById('v-list').addEventListener('click', function(e) {
  const btn = e.target.closest('.v-del');
  if (!btn) return;
  const i = parseInt(btn.dataset.i);
  const nome = vendedores[i];
  vendedores.splice(i, 1);
  saveVend(); renderSelect(); renderLista();
  showToast(nome + ' removido');
});

function addVendedor() {
  const inp = document.getElementById('m-nome');
  const nome = inp.value.trim();
  if (!nome) return;
  if (vendedores.includes(nome)) { showToast('Nome já cadastrado'); return; }
  vendedores.push(nome);
  saveVend(); renderSelect(); renderLista();
  inp.value = ''; inp.focus();
  showToast(nome + ' adicionado');
}

document.getElementById('btn-add-vend').addEventListener('click', addVendedor);
document.getElementById('m-nome').addEventListener('keydown', e => { if (e.key === 'Enter') addVendedor(); });

// Abrir/fechar modal
document.getElementById('btn-vend-open').addEventListener('click', function() {
  document.getElementById('cdd').classList.remove('open');
  renderLista();
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-nome').focus(), 100);
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ── Integração Google Sheets ──
// Após publicar o Apps Script, cole a URL do Web App aqui:
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRlsQBdwLgNmcOxIGq-qPLpPMztVGDfPlYj62mw_hmxA1G5MPjsC9Mut2PAuF0vM3i6g/exec";

// ── Salvar ──
async function salvar() {
  const data     = document.getElementById('f-data').value;
  const vendedor = document.getElementById('f-vendedor').value;
  const produto  = document.getElementById('f-produto').value;
  const qtd      = parseInt(document.getElementById('f-qtd').value) || 1;
  const canal    = document.querySelector('input[name="canal"]:checked').value;
  const meta     = document.getElementById('f-meta').value;
  const catEl    = document.querySelector('input[name="cat"]:checked');
  const categoria = catEl ? catEl.value : '';

  if (!data || !vendedor || !produto) {
    alert('Preencha Data, Vendedor e Produto antes de registrar.');
    return;
  }

  const [nomeProd, preco] = produto.split('|');
  const reg = {
    data,
    vendedor,
    categoria,
    produto: nomeProd,
    valorUnitario: Number(preco),
    valorMuseu: museuVal[nomeProd] || 0,
    quantidade: qtd,
    total: Number(preco) * qtd,
    canal,
    meta: meta ? Number(meta) : null,
    ts: new Date().toISOString()
  };

  // Salvar localmente como backup
  const lista = JSON.parse(localStorage.getItem('mcera_vendas') || '[]');
  lista.push(reg);
  localStorage.setItem('mcera_vendas', JSON.stringify(lista));

  // Enviar para Google Sheets
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Enviando...';
  btn.disabled = true;

  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'COLE_AQUI_A_URL_DO_WEB_APP') {
    // Modo offline — só salva local
    showToast('Salvo localmente (configure a URL do Sheets)');
    btn.textContent = 'Registrar venda';
    btn.disabled = false;
    limpar();
    return;
  }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reg)
    });
    showToast('Venda registrada no Sheets!');
    limpar();
  } catch (err) {
    showToast('Salvo localmente — sem conexão');
    limpar();
  } finally {
    btn.textContent = 'Registrar venda';
    btn.disabled = false;
  }
}

function limpar() {
  document.getElementById('f-vendedor').value = '';
  document.getElementById('f-produto').value  = '';
  document.getElementById('cdd-lbl').textContent = '— Selecione —';
  document.getElementById('cdd-btn').classList.add('ph');
  document.querySelectorAll('.cdd-opt').forEach(o => o.classList.remove('sel'));
  document.querySelectorAll('input[name="cat"]').forEach(r => r.checked = false);
  document.getElementById('cdd-panel').innerHTML = '';
  document.getElementById('f-qtd').value  = 1;
  document.getElementById('f-meta').value = '';
  document.querySelector('input[name="canal"][value="Bilheteria"]').checked = true;
  document.getElementById('row-badge').style.display = 'none';
  document.getElementById('row-vals').style.display  = 'none';
  document.getElementById('v-total').textContent = 'R$ 0,00';
  document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

renderSelect();
</script>
